name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - hml
      - dev

jobs:
  build-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    env:
      REPO_NAME: ${{ github.event.repository.name }}
      REGION: ${{ vars.REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Resolve environment-specific variables
        id: resolve
        run: |
          case "${{ github.ref_name }}" in
            main)
              echo "environment=production"                            >> $GITHUB_OUTPUT
              echo "wif_provider=${{ vars.WIF_PROVIDER_PROD }}"       >> $GITHUB_OUTPUT
              echo "project_id=${{ vars.PROJECT_ID_PROD }}"           >> $GITHUB_OUTPUT
              ;;
            hml)
              echo "environment=staging"                              >> $GITHUB_OUTPUT
              echo "wif_provider=${{ vars.WIF_PROVIDER_HML }}"       >> $GITHUB_OUTPUT
              echo "project_id=${{ vars.PROJECT_ID_HML }}"           >> $GITHUB_OUTPUT
              ;;
            *)
              echo "environment=development"                          >> $GITHUB_OUTPUT
              echo "wif_provider=${{ vars.WIF_PROVIDER_DEV }}"       >> $GITHUB_OUTPUT
              echo "project_id=${{ vars.PROJECT_ID_DEV }}"           >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.resolve.outputs.wif_provider }}
          service_account: github-actions@${{ steps.resolve.outputs.project_id }}.iam.gserviceaccount.com

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Set environment variables
        run: |
          echo "PROJECT_ID=${{ steps.resolve.outputs.project_id }}"   >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ steps.resolve.outputs.environment }}"  >> $GITHUB_ENV

      - name: Set image URL
        run: |
          echo "FULL_REGISTRY_URL=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${REPO_NAME}:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Docker auth
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repo exists
        run: |
          set -e
          if ! gcloud artifacts repositories describe "${REPO_NAME}" \
            --location="${REGION}" \
            --project="${PROJECT_ID}" >/dev/null 2>&1; then
            gcloud artifacts repositories create "${REPO_NAME}" \
              --repository-format=docker \
              --location="${REGION}" \
              --project="${PROJECT_ID}" \
              --description="Docker images for ${REPO_NAME}"
          fi

      - name: Build and push Docker image
        run: |
          docker build -t "$FULL_REGISTRY_URL" .
          docker push "$FULL_REGISTRY_URL"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${REPO_NAME}" \
            --region "${REGION}" \
            --image "$FULL_REGISTRY_URL" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=${ENVIRONMENT}" \
            --service-account="${REPO_NAME}-runtime@${PROJECT_ID}.iam.gserviceaccount.com" \
            --quiet

      - name: Allow public access
        run: |
          gcloud run services add-iam-policy-binding "${REPO_NAME}" \
            --region "${REGION}" \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --quiet
